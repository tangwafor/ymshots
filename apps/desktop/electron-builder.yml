appId: com.tatech.ymshots
productName: YmShotS
copyright: "© 2026 ta-tech"

directories:
  output: out
  buildResources: resources

files:
  - dist/**/*
  - package.json

forceCodeSigning: false

win:
  target:
    - portable
  signAndEditExecutable: false
  artifactName: "YmShotS-${version}-portable.${ext}"

mac:
  target:
    - zip
  category: public.app-category.photography
  identity: null
  artifactName: "YmShotS-${version}-mac.${ext}"

linux:
  target:
    - AppImage
  category: Graphics
  artifactName: "YmShotS-${version}.${ext}"

publish:
  provider: github
  owner: tangwafor
  repo: ymshots
