[build]
  base = "/"
  publish = "site/public"
  functions = "netlify/functions"
  command = "echo 'YmShotS static site deployed'"

[build.environment]
  NODE_VERSION = "20"

# API routes → serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Gallery public routes
[[redirects]]
  from = "/g/*"
  to = "/.netlify/functions/gallery/:splat"
  status = 200

# Webhook routes
[[redirects]]
  from = "/webhooks/*"
  to = "/.netlify/functions/webhooks/:splat"
  status = 200

# AI routes
[[redirects]]
  from = "/ai"
  to = "/.netlify/functions/ai"
  status = 200

# StyleForge AI
[[redirects]]
  from = "/styleforge"
  to = "/.netlify/functions/styleforge"
  status = 200

# Backdrop AI generation
[[redirects]]
  from = "/backdrop"
  to = "/.netlify/functions/backdrop"
  status = 200

# Notifications/analytics
[[redirects]]
  from = "/notify"
  to = "/.netlify/functions/notify"
  status = 200

# SPA fallback for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
